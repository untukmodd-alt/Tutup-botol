<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tutup Botol - Game</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Outfit',sans-serif;}
canvas{display:block;position:fixed;top:0;left:0;touch-action:none;}
#dc{position:fixed;top:0;left:0;pointer-events:none;z-index:4;}
#hud{position:fixed;top:0;left:0;right:0;z-index:10;height:44px;display:flex;align-items:center;gap:6px;padding:0 10px;background:rgba(0,0,0,0.55);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,0.07);}
.hud-p{display:flex;align-items:center;gap:5px;padding:3px 9px;border-radius:99px;background:rgba(255,255,255,0.05);border:1.5px solid transparent;font-family:'Boogaloo',cursive;font-size:12px;color:rgba(255,255,255,0.5);transition:all 0.25s;}
.hud-p.active{background:rgba(255,255,255,0.12);color:#fff;border-color:var(--pc);box-shadow:0 0 10px var(--pc);}
.hud-p.dead{opacity:0.25;}
.hud-dot{width:9px;height:9px;border-radius:50%;background:var(--pc);box-shadow:0 0 5px var(--pc);}
.hud-k{background:rgba(255,255,255,0.08);border-radius:99px;padding:1px 6px;font-size:10px;color:var(--pc);font-weight:800;}
#hsp{flex:1;}
#hback{background:rgba(255,255,255,0.07);border:none;border-radius:50%;width:28px;height:28px;color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
#minimap{position:fixed;bottom:12px;right:12px;z-index:10;border-radius:10px;overflow:hidden;border:1.5px solid rgba(255,255,255,0.15);box-shadow:0 4px 20px rgba(0,0,0,0.5);}
#pwrap{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:10;opacity:0;transition:opacity 0.2s;display:flex;flex-direction:column;align-items:center;gap:4px;}
#plabel{font-family:'Boogaloo',cursive;font-size:12px;color:#fff;letter-spacing:1px;}
#pbar{width:160px;height:7px;background:rgba(255,255,255,0.12);border-radius:99px;overflow:hidden;}
#pfill{height:100%;width:0%;border-radius:99px;background:linear-gradient(90deg,#00d4aa,#f5c518,#e94560);transition:width 0.05s;}
#tann{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Boogaloo',cursive;font-size:26px;color:#fff;background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);padding:10px 26px;border-radius:14px;border:2px solid rgba(255,255,255,0.12);z-index:20;pointer-events:none;opacity:0;transition:opacity 0.3s;}
#tann.show{opacity:1;}
.kpop{position:fixed;z-index:25;font-family:'Boogaloo',cursive;font-size:18px;color:#fff;text-shadow:0 0 16px currentColor;pointer-events:none;animation:kp 1.3s ease forwards;}
@keyframes kp{0%{opacity:0;transform:translateY(0) scale(0.5);}20%{opacity:1;transform:translateY(-8px) scale(1.15);}70%{opacity:1;transform:translateY(-30px);}100%{opacity:0;transform:translateY(-60px);}}
#win{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,0.88);backdrop-filter:blur(12px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;opacity:0;pointer-events:none;transition:opacity 0.4s;}
#win.show{opacity:1;pointer-events:all;}
#wball{width:90px;height:90px;border-radius:50%;box-shadow:inset -8px -8px 20px rgba(0,0,0,0.3),inset 4px 4px 12px rgba(255,255,255,0.4);animation:bobb 2s ease-in-out infinite;}
@keyframes bobb{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
#wtitle{font-family:'Boogaloo',cursive;font-size:34px;color:#fff;text-align:center;}
#wkills{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.wbadge{background:rgba(255,255,255,0.07);border-radius:10px;padding:8px 14px;font-family:'Boogaloo',cursive;font-size:14px;color:#fff;display:flex;align-items:center;gap:6px;}
#bagain{background:linear-gradient(135deg,#7c5cfc,#5a3fcf);border:none;border-radius:14px;padding:13px 34px;color:#fff;font-family:'Boogaloo',cursive;font-size:20px;cursor:pointer;box-shadow:0 6px 20px rgba(124,92,252,0.4);margin-top:6px;}
#bagain:active{transform:scale(0.96);}
#msel{position:fixed;inset:0;z-index:40;background:rgba(0,0,0,0.93);backdrop-filter:blur(10px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:16px;}
#msel h2{font-family:'Boogaloo',cursive;font-size:24px;color:#fff;margin-bottom:2px;}
.msl{font-size:11px;color:rgba(255,255,255,0.4);font-weight:700;text-transform:uppercase;letter-spacing:1px;}
.pcrow{display:flex;gap:8px;}
.pct{width:42px;height:42px;border-radius:10px;background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.12);color:#fff;font-family:'Boogaloo',cursive;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.pct.sel{background:rgba(124,92,252,0.3);border-color:#7c5cfc;color:#c4b0ff;}
.pct:active{transform:scale(0.9);}
.mgrid{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:420px;}
.mbtn{width:76px;height:64px;border-radius:12px;border:2px solid rgba(255,255,255,0.1);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;transition:all 0.15s;font-family:'Boogaloo',cursive;font-size:10px;color:#fff;}
.mbtn.sel{border-color:#7c5cfc;box-shadow:0 0 12px rgba(124,92,252,0.5);}
.mbtn:active{transform:scale(0.93);}
#bgo{background:linear-gradient(135deg,#e94560,#c0392b);border:none;border-radius:14px;padding:13px 38px;color:#fff;font-family:'Boogaloo',cursive;font-size:20px;cursor:pointer;box-shadow:0 6px 20px rgba(233,69,96,0.4);margin-top:4px;}
#bgo:active{transform:scale(0.96);}
</style>
</head>
<body>
<canvas id="wc"></canvas>
<canvas id="dc"></canvas>
<div id="hud" style="display:none">
  <button id="hback" onclick="backMenu()">‹</button>
  <div id="hplayers"></div>
  <div id="hsp"></div>
  <div id="hturn" style="font-family:'Boogaloo',cursive;font-size:13px;color:rgba(255,255,255,0.6)"></div>
</div>
<canvas id="minimap" width="110" height="80"></canvas>
<div id="pwrap"><div id="plabel">POWER</div><div id="pbar"><div id="pfill"></div></div></div>
<div id="tann"></div>
<div id="win">
  <div id="wball"></div>
  <div id="wtitle"></div>
  <div id="wkills"></div>
  <button id="bagain" onclick="showSel()">Main Lagi</button>
</div>
<div id="msel">
  <h2>Tutup Botol</h2>
  <div class="msl">Jumlah Pemain</div>
  <div class="pcrow" id="pcrow">
    <div class="pct sel" data-n="2" onclick="selN(this)">2</div>
    <div class="pct" data-n="3" onclick="selN(this)">3</div>
    <div class="pct" data-n="4" onclick="selN(this)">4</div>
    <div class="pct" data-n="5" onclick="selN(this)">5</div>
    <div class="pct" data-n="6" onclick="selN(this)">6</div>
  </div>
  <div class="msl">Pilih Map</div>
  <div class="mgrid" id="mgrid"></div>
  <button id="bgo" onclick="startG()">Mulai!</button>
</div>
<script>
const wc=document.getElementById('wc'),ctx=wc.getContext('2d');
const dc=document.getElementById('dc'),dctx=dc.getContext('2d');
const mm=document.getElementById('minimap'),mctx=mm.getContext('2d');
function resize(){wc.width=dc.width=window.innerWidth;wc.height=dc.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);
const WW=2200,WH=1500,HH=44,BR=20,FR=0.962,BO=0.58,MP=24,SS=0.28,CS=0.07;
const PC=['#00d4aa','#e94560','#f5c518','#7c5cfc','#74b9ff','#fd9644'];
const PN=['Player 1','Player 2','Player 3','Player 4','Player 5','Player 6'];
const MAPS=[
  {id:'forest',name:'Hutan',b:['#0d2e0d','#183a10'],em:'🌲'},
  {id:'space',name:'Angkasa',b:['#020210','#050520'],em:'🌌'},
  {id:'water',name:'Laut',b:['#041828','#062a46'],em:'🌊'},
  {id:'ground',name:'Tanah',b:['#3d2508','#2a1a04'],em:'🏜️'},
  {id:'random',name:'Acak',b:['#0a0a1a','#12122a'],em:'🎲'},
];
let players=[],obs=[],parts=[],curP=0,running=false,moving=false;
let selM='forest',nP=2,curM='forest';
let drag=false,ds=null,dc2=null;
let cx=0,cy=0,ctx2=0,cty=0;
let af=null;

// Map select
function initMG(){
  const g=document.getElementById('mgrid');g.innerHTML='';
  MAPS.forEach(m=>{
    const b=document.createElement('div');b.className='mbtn'+(m.id===selM?' sel':'');
    b.style.background=m.id==='space'?'radial-gradient(ellipse,#1a1040,#020210)':m.id==='forest'?'radial-gradient(ellipse,#1a4a10,#0a200a)':m.id==='water'?'radial-gradient(ellipse,#0a3060,#020f20)':m.id==='ground'?'radial-gradient(ellipse,#5a3510,#2a1a04)':'linear-gradient(135deg,#1a1040,#0a2040)';
    b.innerHTML=`<span style="font-size:20px">${m.em}</span><div>${m.name}</div>`;
    b.onclick=()=>{selM=m.id;document.querySelectorAll('.mbtn').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');};
    g.appendChild(b);
  });
}
initMG();
function selN(el){nP=parseInt(el.dataset.n);document.querySelectorAll('.pct').forEach(x=>x.classList.remove('sel'));el.classList.add('sel');}
function showSel(){document.getElementById('msel').style.display='flex';document.getElementById('win').classList.remove('show');document.getElementById('hud').style.display='none';document.getElementById('minimap').style.display='none';running=false;if(af)cancelAnimationFrame(af);ctx.clearRect(0,0,wc.width,wc.height);}
showSel();

function startG(){
  document.getElementById('msel').style.display='none';
  document.getElementById('hud').style.display='flex';
  document.getElementById('minimap').style.display='block';
  document.getElementById('win').classList.remove('show');
  curM=selM==='random'?MAPS[Math.floor(Math.random()*4)].id:selM;
  initPl();genObs();buildHUD();running=true;moving=false;curP=0;parts=[];
  cx=ctx2=players[0].x-wc.width/2;cy=cty=players[0].y-wc.height/2+HH/2;clampC();
  showTA();if(af)cancelAnimationFrame(af);loop();
}
function initPl(){
  players=[];
  const pos=[[WW*.12,WH*.5],[WW*.88,WH*.5],[WW*.5,WH*.12],[WW*.5,WH*.88],[WW*.18,WH*.2],[WW*.82,WH*.8]];
  for(let i=0;i<nP;i++) players.push({x:pos[i][0],y:pos[i][1],vx:0,vy:0,color:PC[i],name:PN[i],alive:true,kills:0,idx:i,trail:[]});
}
function genObs(){
  obs=[];if(curM==='ground')return;
  const cnt=curM==='forest'?28:curM==='space'?22:curM==='water'?24:18;
  let t=0;
  while(obs.length<cnt&&t++<cnt*8){
    const x=WW*.06+Math.random()*WW*.88,y=WH*.06+Math.random()*WH*.88;
    if(players.some(p=>Math.hypot(p.x-x,p.y-y)<110))continue;
    const tp=pickT(curM),r=18+Math.random()*28,o={x,y,r,tp,rot:Math.random()*Math.PI*2};
    if(!obs.some(ob=>Math.hypot(ob.x-x,ob.y-y)<(o.r+ob.r+14)))obs.push(o);
  }
}
function pickT(m){
  const t={forest:['tree','bush','rock','log','mushroom','stump'],space:['asteroid','planet','meteor','debris','crystal','comet'],water:['coral','reef','island','rock','whirlpool','anchor']};
  const l=t[m]||['rock'];return l[Math.floor(Math.random()*l.length)];
}

// Draw obstacles
function drawO(o){
  ctx.save();ctx.translate(o.x,o.y);ctx.rotate(o.rot);
  const r=o.r;
  switch(o.tp){
    case'tree':{
      ctx.fillStyle='#5c3a1a';ctx.beginPath();ctx.roundRect(-r*.15,-r*.1,r*.3,r*.6,3);ctx.fill();
      const g=ctx.createRadialGradient(0,-r*.4,0,0,-r*.1,r*.9);g.addColorStop(0,'#4aaa2a');g.addColorStop(1,'#1a5a0a');ctx.fillStyle=g;
      [[0,-r*.55,r*.82,r*.72],[r*.28,-r*.2,r*.55,r*.48],[-r*.3,-r*.22,r*.52,r*.46]].forEach(([x,y,rx,ry])=>{ctx.beginPath();ctx.ellipse(x,y,rx,ry,0,0,Math.PI*2);ctx.fill();});
      ctx.fillStyle='rgba(255,255,255,0.08)';ctx.beginPath();ctx.ellipse(-r*.2,-r*.55,r*.22,r*.14,-0.4,0,Math.PI*2);ctx.fill();break;}
    case'bush':{
      const g=ctx.createRadialGradient(0,-r*.1,0,0,0,r);g.addColorStop(0,'#5add2a');g.addColorStop(1,'#2a7a0a');ctx.fillStyle=g;
      for(let i=0;i<6;i++){const a=i/6*Math.PI*2,r2=r*(0.55+Math.sin(i)*.1);ctx.beginPath();ctx.ellipse(Math.cos(a)*r*.32,Math.sin(a)*r*.28,r2*.52,r2*.46,a,0,Math.PI*2);ctx.fill();}
      ctx.beginPath();ctx.ellipse(0,0,r*.62,r*.55,0,0,Math.PI*2);ctx.fill();break;}
    case'rock':{
      const g=ctx.createRadialGradient(-r*.2,-r*.3,0,0,0,r);g.addColorStop(0,'#8a7878');g.addColorStop(1,'#4a4242');ctx.fillStyle=g;
      ctx.beginPath();ctx.moveTo(0,-r*.92);ctx.bezierCurveTo(r*.7,-r*.65,r*.92,r*.15,r*.55,r*.82);ctx.bezierCurveTo(0,r*.98,-r*.65,r*.78,-r*.88,r*.12);ctx.bezierCurveTo(-r,-r*.45,-r*.55,-r,0,-r*.92);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.12)';ctx.beginPath();ctx.ellipse(-r*.28,-r*.32,r*.28,r*.16,-0.5,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(-r*.1,-r*.3);ctx.lineTo(r*.15,r*.2);ctx.stroke();break;}
    case'log':{
      const len=r*2.2,h=r*.7;
      ctx.fillStyle='rgba(0,0,0,0.2)';ctx.beginPath();ctx.ellipse(0,h*.55,len*.45,h*.25,0,0,Math.PI*2);ctx.fill();
      const g=ctx.createLinearGradient(0,-h*.5,0,h*.5);g.addColorStop(0,'#8b5e2a');g.addColorStop(1,'#5c3a15');ctx.fillStyle=g;
      ctx.beginPath();ctx.roundRect(-len*.5,-h*.42,len,h,h*.42);ctx.fill();
      [-len*.44,len*.44].forEach(ex=>{
        const eg=ctx.createRadialGradient(ex,0,0,ex,0,h*.44);eg.addColorStop(0,'#aa7a3a');eg.addColorStop(1,'#6a4020');ctx.fillStyle=eg;ctx.beginPath();ctx.ellipse(ex,0,h*.4,h*.42,0,0,Math.PI*2);ctx.fill();
        [.7,.5,.3].forEach(rs=>{ctx.strokeStyle='rgba(0,0,0,0.15)';ctx.lineWidth=1;ctx.beginPath();ctx.ellipse(ex,0,h*.4*rs,h*.42*rs,0,0,Math.PI*2);ctx.stroke();});
      });break;}
    case'mushroom':{
      ctx.fillStyle='#d4a04a';ctx.beginPath();ctx.roundRect(-r*.2,0,r*.4,r*.55,4);ctx.fill();
      const g=ctx.createRadialGradient(0,-r*.3,0,0,0,r);g.addColorStop(0,'#ff4444');g.addColorStop(1,'#aa1111');ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,-r*.15,r*.9,Math.PI,0);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.75)';[[0,-r*.55,r*.16],[r*.45,-r*.3,r*.1],[-r*.4,-r*.25,r*.09]].forEach(([x,y,rr])=>{ctx.beginPath();ctx.arc(x,y,rr,0,Math.PI*2);ctx.fill();});break;}
    case'stump':{
      const g=ctx.createLinearGradient(0,-r*.3,0,r*.5);g.addColorStop(0,'#7a5030');g.addColorStop(1,'#4a2a10');ctx.fillStyle=g;ctx.beginPath();ctx.ellipse(0,0,r*.9,r*.55,0,0,Math.PI*2);ctx.fill();
      [.75,.5,.3,.15].forEach(rs=>{ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=1.5;ctx.beginPath();ctx.ellipse(0,0,r*.9*rs,r*.55*rs,0,0,Math.PI*2);ctx.stroke();});break;}
    case'asteroid':{
      const g=ctx.createRadialGradient(-r*.2,-r*.2,0,0,0,r);g.addColorStop(0,'#7a6888');g.addColorStop(1,'#3a2850');ctx.fillStyle=g;
      ctx.beginPath();for(let i=0;i<9;i++){const a=i/9*Math.PI*2,r2=r*(.68+Math.sin(i*2.3)*.3);i===0?ctx.moveTo(Math.cos(a)*r2,Math.sin(a)*r2):ctx.lineTo(Math.cos(a)*r2,Math.sin(a)*r2);}ctx.closePath();ctx.fill();
      ctx.fillStyle='rgba(0,0,0,0.3)';[[r*.15,r*.1,r*.14],[-r*.2,-r*.05,r*.09],[r*.05,-r*.25,r*.07]].forEach(([x,y,rr])=>{ctx.beginPath();ctx.arc(x,y,rr,0,Math.PI*2);ctx.fill();});
      ctx.fillStyle='rgba(255,255,255,0.1)';ctx.beginPath();ctx.ellipse(-r*.3,-r*.35,r*.22,r*.13,-0.5,0,Math.PI*2);ctx.fill();break;}
    case'planet':{
      const g=ctx.createRadialGradient(-r*.3,-r*.35,0,0,0,r);g.addColorStop(0,'#9060ff');g.addColorStop(0.5,'#4a20a0');g.addColorStop(1,'#1a0860');ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.06)';[-r*.3,0,r*.3].forEach(yb=>{ctx.save();ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.clip();ctx.beginPath();ctx.rect(-r,yb-r*.08,r*2,r*.16);ctx.fill();ctx.restore();});
      ctx.strokeStyle='rgba(180,140,255,0.45)';ctx.lineWidth=3;ctx.beginPath();ctx.ellipse(0,0,r*1.65,r*.38,.3,0,Math.PI*2);ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,0.15)';ctx.beginPath();ctx.ellipse(-r*.3,-r*.35,r*.28,r*.18,-0.5,0,Math.PI*2);ctx.fill();break;}
    case'meteor':{
      const tg=ctx.createLinearGradient(-r*1.3,-r*1.3,0,0);tg.addColorStop(0,'rgba(255,80,0,0)');tg.addColorStop(.5,'rgba(255,150,50,0.4)');tg.addColorStop(1,'rgba(255,200,100,0.6)');ctx.fillStyle=tg;ctx.beginPath();ctx.moveTo(-r*1.4,-r*1.4);ctx.lineTo(0,-r*.4);ctx.lineTo(-r*.4,0);ctx.closePath();ctx.fill();
      const g=ctx.createRadialGradient(-r*.1,-r*.1,0,0,0,r*.75);g.addColorStop(0,'#ff9944');g.addColorStop(.6,'#cc3300');g.addColorStop(1,'#660000');ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,r*.75,0,Math.PI*2);ctx.fill();break;}
    case'debris':{
      const g=ctx.createRadialGradient(0,0,0,0,0,r);g.addColorStop(0,'#5a5580');g.addColorStop(1,'#2a2850');ctx.fillStyle=g;
      for(let i=0;i<5;i++){ctx.save();ctx.rotate(i*Math.PI*.4+Math.sin(i)*.5);ctx.beginPath();ctx.roundRect(-r*.45,-r*.08,r*(.7+i*.08),r*.18,3);ctx.fill();ctx.restore();}break;}
    case'crystal':{
      const g=ctx.createLinearGradient(0,-r,0,r);g.addColorStop(0,'#aaffff');g.addColorStop(.5,'#2288cc');g.addColorStop(1,'#004488');ctx.fillStyle=g;
      ctx.beginPath();ctx.moveTo(0,-r);ctx.lineTo(r*.5,0);ctx.lineTo(0,r);ctx.lineTo(-r*.5,0);ctx.closePath();ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.25)';ctx.beginPath();ctx.moveTo(0,-r);ctx.lineTo(r*.1,-r*.1);ctx.lineTo(-r*.08,0);ctx.closePath();ctx.fill();
      [[r*.55,-r*.4,r*.5],[-r*.6,-r*.3,r*.45]].forEach(([x,y,h])=>{ctx.save();ctx.translate(x,y);ctx.rotate(x>0?.5:-.5);ctx.fillStyle='rgba(100,220,255,0.7)';ctx.beginPath();ctx.moveTo(0,-h*.5);ctx.lineTo(h*.22,0);ctx.lineTo(0,h*.5);ctx.lineTo(-h*.22,0);ctx.closePath();ctx.fill();ctx.restore();});break;}
    case'comet':{
      const tg=ctx.createLinearGradient(-r*1.8,-r*.8,0,0);tg.addColorStop(0,'rgba(100,200,255,0)');tg.addColorStop(1,'rgba(100,200,255,0.35)');ctx.fillStyle=tg;ctx.beginPath();ctx.moveTo(-r*2,-r*.6);ctx.quadraticCurveTo(-r*.5,0,0,0);ctx.quadraticCurveTo(-r*.5,0,-r*2,r*.6);ctx.closePath();ctx.fill();
      const g=ctx.createRadialGradient(-r*.1,-r*.1,0,0,0,r*.65);g.addColorStop(0,'#ffffff');g.addColorStop(.3,'#88ddff');g.addColorStop(1,'#2266aa');ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,r*.65,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(100,200,255,0.3)';ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,0,r*.8,0,Math.PI*2);ctx.stroke();break;}
    case'coral':{
      const cols=['#e74c3c','#e67e22','#ff8fa3'];ctx.lineCap='round';ctx.lineWidth=3.5;
      for(let i=0;i<6;i++){const a=-Math.PI/2+(i-2.5)*.38;ctx.strokeStyle=cols[i%3];ctx.beginPath();ctx.moveTo(0,r*.42);ctx.quadraticCurveTo(Math.cos(a)*r*.35,0,Math.cos(a)*r*.72,-r*.65);ctx.stroke();ctx.beginPath();ctx.moveTo(Math.cos(a)*r*.45,-r*.25);ctx.lineTo(Math.cos(a+.45)*r*.56,-r*.55);ctx.stroke();}
      ctx.fillStyle='#c0392b';ctx.beginPath();ctx.arc(0,r*.42,r*.2,0,Math.PI*2);ctx.fill();break;}
    case'reef':{
      const g=ctx.createRadialGradient(0,0,0,0,0,r);g.addColorStop(0,'#4a8a6a');g.addColorStop(1,'#1a4a3a');ctx.fillStyle=g;
      ctx.beginPath();for(let i=0;i<8;i++){const a=i/8*Math.PI*2,r2=r*(.6+Math.sin(i*1.7)*.38);i===0?ctx.moveTo(Math.cos(a)*r2,Math.sin(a)*r2):ctx.lineTo(Math.cos(a)*r2,Math.sin(a)*r2);}ctx.closePath();ctx.fill();
      ctx.fillStyle='rgba(100,220,180,0.2)';ctx.beginPath();ctx.ellipse(-r*.2,-r*.25,r*.3,r*.2,-.3,0,Math.PI*2);ctx.fill();break;}
    case'island':{
      ctx.fillStyle='rgba(0,80,160,0.3)';ctx.beginPath();ctx.ellipse(0,r*.2,r*1.15,r*.38,0,0,Math.PI*2);ctx.fill();
      const g=ctx.createRadialGradient(0,-r*.1,0,0,0,r);g.addColorStop(0,'#7add3a');g.addColorStop(.65,'#5aaa2a');g.addColorStop(1,'#c8a858');ctx.fillStyle=g;ctx.beginPath();ctx.ellipse(0,0,r,r*.68,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#5c3a1a';ctx.fillRect(-3,-r*.6,5,r*.6);
      const lg=ctx.createRadialGradient(0,-r*.72,0,0,-r*.65,r*.4);lg.addColorStop(0,'#5add2a');lg.addColorStop(1,'#2a8a10');ctx.fillStyle=lg;ctx.beginPath();ctx.arc(0,-r*.72,r*.38,0,Math.PI*2);ctx.fill();break;}
    case'whirlpool':{
      for(let i=0;i<4;i++){ctx.strokeStyle=`rgba(0,150,220,${.5-i*.1})`;ctx.lineWidth=2-i*.3;ctx.beginPath();for(let t2=0;t2<Math.PI*2;t2+=.1){const r2=r*(.9-i*.2)*(t2/(Math.PI*2));t2===0?ctx.moveTo(Math.cos(t2+i)*r2,Math.sin(t2+i)*r2):ctx.lineTo(Math.cos(t2+i)*r2,Math.sin(t2+i)*r2);}ctx.stroke();}
      ctx.fillStyle='rgba(0,100,180,0.4)';ctx.beginPath();ctx.arc(0,0,r*.22,0,Math.PI*2);ctx.fill();break;}
    case'anchor':{
      ctx.strokeStyle='#4a5a7a';ctx.lineWidth=r*.18;ctx.lineCap='round';ctx.lineJoin='round';
      ctx.beginPath();ctx.moveTo(0,-r*.7);ctx.lineTo(0,r*.5);ctx.stroke();
      ctx.beginPath();ctx.arc(0,-r*.5,r*.22,0,Math.PI*2);ctx.stroke();
      ctx.beginPath();ctx.moveTo(-r*.5,-r*.7);ctx.lineTo(r*.5,-r*.7);ctx.stroke();
      ctx.beginPath();ctx.moveTo(-r*.5,r*.5);ctx.quadraticCurveTo(-r*.6,r*.1,0,r*.5);ctx.stroke();
      ctx.beginPath();ctx.moveTo(r*.5,r*.5);ctx.quadraticCurveTo(r*.6,r*.1,0,r*.5);ctx.stroke();break;}
  }
  ctx.restore();
}

// Background
function drawBG(){
  const m=MAPS.find(x=>x.id===curM)||MAPS[0];
  const g=ctx.createLinearGradient(0,0,0,WH);g.addColorStop(0,m.b[0]);g.addColorStop(1,m.b[1]);ctx.fillStyle=g;ctx.fillRect(0,0,WW,WH);
  if(curM==='space'){
    ctx.fillStyle='#fff';
    for(let i=0;i<200;i++){const sx=(i*137.5+17)%WW,sy=(i*97.3+13)%WH;ctx.globalAlpha=.3+Math.random()*.5;ctx.beginPath();ctx.arc(sx,sy,Math.random()<.1?1.5:.6,0,Math.PI*2);ctx.fill();}
    ctx.globalAlpha=1;
    [[WW*.3,WH*.4],[WW*.7,WH*.6],[WW*.5,WH*.2]].forEach(([nx,ny])=>{const ng=ctx.createRadialGradient(nx,ny,0,nx,ny,WW*.2);ng.addColorStop(0,'rgba(60,0,120,0.15)');ng.addColorStop(1,'transparent');ctx.fillStyle=ng;ctx.fillRect(0,0,WW,WH);});
  } else if(curM==='forest'){
    ctx.fillStyle='rgba(0,60,0,0.1)';for(let i=0;i<60;i++){ctx.beginPath();ctx.ellipse((i*173)%WW,(i*131+50)%WH,3+Math.random()*5,2+Math.random()*3,Math.random()*Math.PI,0,Math.PI*2);ctx.fill();}
  } else if(curM==='water'){
    ctx.strokeStyle='rgba(0,150,255,0.06)';ctx.lineWidth=1.5;for(let i=0;i<14;i++){ctx.beginPath();ctx.ellipse(WW*.5,WH*.5,WW*.06*(i+1),WH*.03*(i+1),0,0,Math.PI*2);ctx.stroke();}
  } else if(curM==='ground'){
    ctx.strokeStyle='rgba(120,70,20,0.15)';ctx.lineWidth=1;
    for(let i=0;i<20;i++){ctx.beginPath();ctx.moveTo(0,WH*i/20);ctx.lineTo(WW,WH*i/20);ctx.stroke();}
    for(let i=0;i<30;i++){ctx.beginPath();ctx.moveTo(WW*i/30,0);ctx.lineTo(WW*i/30,WH);ctx.stroke();}
  }
  ctx.strokeStyle='rgba(255,255,255,0.08)';ctx.lineWidth=4;ctx.strokeRect(2,2,WW-4,WH-4);
}

// Player
function drawPl(p,ia){
  if(!p.alive)return;
  if(p.trail.length>1){ctx.beginPath();ctx.moveTo(p.trail[0].x,p.trail[0].y);p.trail.forEach(pt=>ctx.lineTo(pt.x,pt.y));ctx.strokeStyle=p.color+'44';ctx.lineWidth=BR*1.3;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();ctx.strokeStyle=p.color+'18';ctx.lineWidth=BR*2;ctx.stroke();}
  if(ia&&!moving){const pulse=.5+.5*Math.sin(Date.now()/280);ctx.beginPath();ctx.arc(p.x,p.y,BR+6+pulse*4,0,Math.PI*2);ctx.strokeStyle=p.color+Math.floor(pulse*99).toString(16).padStart(2,'0');ctx.lineWidth=2;ctx.setLineDash([4,4]);ctx.stroke();ctx.setLineDash([]);ctx.beginPath();ctx.arc(p.x,p.y,BR+3,0,Math.PI*2);ctx.strokeStyle=p.color+'88';ctx.lineWidth=1.5;ctx.stroke();}
  ctx.fillStyle='rgba(0,0,0,0.28)';ctx.beginPath();ctx.ellipse(p.x+3,p.y+BR*.85,BR*.68,BR*.22,0,0,Math.PI*2);ctx.fill();
  const g=ctx.createRadialGradient(p.x-BR*.3,p.y-BR*.32,0,p.x,p.y,BR);g.addColorStop(0,li(p.color,65));g.addColorStop(.5,p.color);g.addColorStop(1,da(p.color,45));ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.x,p.y,BR,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.42)';ctx.beginPath();ctx.ellipse(p.x-BR*.28,p.y-BR*.3,BR*.2,BR*.13,-.5,0,Math.PI*2);ctx.fill();
  if(ia){ctx.font='bold 11px Outfit';ctx.textAlign='center';const tw=ctx.measureText(p.name).width+12;ctx.fillStyle='rgba(0,0,0,0.55)';ctx.beginPath();ctx.roundRect(p.x-tw/2,p.y-BR-22,tw,16,4);ctx.fill();ctx.fillStyle='#fff';ctx.fillText(p.name,p.x,p.y-BR-10);ctx.textAlign='left';}
}

// Particles
function spP(x,y,color,n=14){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=2+Math.random()*6;parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:3+Math.random()*5,color,life:1,dec:.035+Math.random()*.025});}}
function spB(x,y,color){for(let i=0;i<6;i++){const a=Math.random()*Math.PI*2,sp=1+Math.random()*3;parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:2+Math.random()*2.5,color,life:.7,dec:.09});}}
function updP(){parts=parts.filter(p=>p.life>0);parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=.92;p.vy*=.92;p.vy+=.08;p.life-=p.dec;p.r*=.97;});}
function drwP(){parts.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;}

// Physics
function phys(){
  const ap=players[curP];if(!ap||!ap.alive)return;
  if(Math.hypot(ap.vx,ap.vy)<SS&&moving){ap.vx=0;ap.vy=0;moving=false;ap.trail=[];nextT();return;}
  ap.vx*=FR;ap.vy*=FR;ap.x+=ap.vx;ap.y+=ap.vy;
  ap.trail.push({x:ap.x,y:ap.y});if(ap.trail.length>28)ap.trail.shift();
  if(ap.x-BR<0){ap.x=BR;ap.vx=Math.abs(ap.vx)*BO;spB(ap.x,ap.y,ap.color);}
  if(ap.x+BR>WW){ap.x=WW-BR;ap.vx=-Math.abs(ap.vx)*BO;spB(ap.x,ap.y,ap.color);}
  if(ap.y-BR<0){ap.y=BR;ap.vy=Math.abs(ap.vy)*BO;spB(ap.x,ap.y,ap.color);}
  if(ap.y+BR>WH){ap.y=WH-BR;ap.vy=-Math.abs(ap.vy)*BO;spB(ap.x,ap.y,ap.color);}
  obs.forEach(o=>{const dx=ap.x-o.x,dy=ap.y-o.y,d=Math.hypot(dx,dy),md=BR+o.r*.82;if(d<md&&d>0){const nx=dx/d,ny=dy/d;ap.x=o.x+nx*md;ap.y=o.y+ny*md;const dot=ap.vx*nx+ap.vy*ny;ap.vx=(ap.vx-2*dot*nx)*BO;ap.vy=(ap.vy-2*dot*ny)*BO;spB(ap.x,ap.y,ap.color);}});
  for(const p of players){
    if(p===ap||!p.alive)continue;
    if(Math.hypot(ap.x-p.x,ap.y-p.y)<BR*1.85){
      p.alive=false;ap.kills++;spP(p.x,p.y,p.color,22);showKP(p,ap);updHUD();
      const alive=players.filter(x=>x.alive);
      if(alive.length<=1){setTimeout(()=>showW(ap),700);return;}
      setTimeout(()=>{ap.vx=0;ap.vy=0;moving=false;ap.trail=[];showTA();},350);
    }
  }
}

// Camera
function clampC(){ctx2=Math.max(0,Math.min(WW-wc.width,ctx2));cty=Math.max(0,Math.min(WH-wc.height+HH,cty));}
function updC(){const ap=players[curP];if(ap&&ap.alive){ctx2=ap.x-wc.width/2;cty=ap.y-wc.height/2+HH/2;clampC();}cx+=(ctx2-cx)*CS;cy+=(cty-cy)*CS;}

// Minimap
function drwMM(){
  const mw=mm.width,mh=mm.height,sx=mw/WW,sy=mh/WH;
  mctx.clearRect(0,0,mw,mh);mctx.fillStyle='rgba(0,0,0,0.7)';mctx.fillRect(0,0,mw,mh);
  mctx.fillStyle='rgba(255,255,255,0.1)';obs.forEach(o=>{mctx.beginPath();mctx.arc(o.x*sx,o.y*sy,Math.max(2,o.r*sx*.7),0,Math.PI*2);mctx.fill();});
  mctx.strokeStyle='rgba(255,255,255,0.2)';mctx.lineWidth=1;mctx.strokeRect(cx*sx,cy*sy,wc.width*sx,(wc.height-HH)*sy);
  players.forEach(p=>{if(!p.alive)return;mctx.fillStyle=p.color;mctx.beginPath();mctx.arc(p.x*sx,p.y*sy,4,0,Math.PI*2);mctx.fill();mctx.strokeStyle='rgba(0,0,0,0.5)';mctx.lineWidth=1;mctx.stroke();if(players[curP]===p){mctx.strokeStyle=p.color;mctx.lineWidth=1.5;mctx.beginPath();mctx.arc(p.x*sx,p.y*sy,6,0,Math.PI*2);mctx.stroke();}});
}

// Drag
function gxy(e){const t=e.touches?e.touches[0]:e;return{x:t.clientX,y:t.clientY};}
wc.addEventListener('pointerdown',e=>{
  if(!running||moving)return;const p=players[curP];if(!p||!p.alive)return;
  const pos=gxy(e),wx=pos.x+cx,wy=pos.y+cy;
  if(Math.hypot(wx-p.x,wy-p.y)<BR*3.5){drag=true;ds=pos;dc2=pos;wc.setPointerCapture(e.pointerId);document.getElementById('pwrap').style.opacity='1';}
},{passive:false});
wc.addEventListener('pointermove',e=>{
  if(!drag)return;e.preventDefault();dc2=gxy(e);drwDL();
  const dx=ds.x-dc2.x,dy=ds.y-dc2.y;document.getElementById('pfill').style.width=(Math.min(Math.hypot(dx,dy)/90,1)*100)+'%';
},{passive:false});
wc.addEventListener('pointerup',e=>{
  if(!drag)return;drag=false;document.getElementById('pwrap').style.opacity='0';dctx.clearRect(0,0,dc.width,dc.height);
  const p=players[curP];if(!p||!p.alive)return;
  const dx=ds.x-dc2.x,dy=ds.y-dc2.y,dist=Math.hypot(dx,dy);if(dist<8)return;
  const pw=Math.min(dist/90,1),sp=pw*MP;p.vx=(dx/dist)*sp;p.vy=(dy/dist)*sp;moving=true;p.trail=[];spP(p.x,p.y,p.color,8);
});
function drwDL(){
  dctx.clearRect(0,0,dc.width,dc.height);if(!ds||!dc2)return;
  const p=players[curP];if(!p)return;
  const dx=ds.x-dc2.x,dy=ds.y-dc2.y,dist=Math.hypot(dx,dy);if(dist<4)return;
  const nx=dx/dist,ny=dy/dist,pw=Math.min(dist/90,1);
  const sx=p.x-cx,sy=p.y-cy;
  let px=p.x,py=p.y,pvx=nx*pw*MP,pvy=ny*pw*MP;
  for(let i=0;i<14;i++){pvx*=FR;pvy*=FR;px+=pvx;py+=pvy;dctx.globalAlpha=(1-i/14)*.55;dctx.fillStyle=p.color;dctx.beginPath();dctx.arc(px-cx,py-cy,BR*(1-i/18),0,Math.PI*2);dctx.fill();}
  dctx.globalAlpha=1;
  dctx.strokeStyle=p.color+'aa';dctx.lineWidth=2;dctx.setLineDash([5,5]);dctx.beginPath();dctx.moveTo(sx,sy);dctx.lineTo(sx+nx*pw*70,sy+ny*pw*70);dctx.stroke();dctx.setLineDash([]);
  dctx.fillStyle=p.color+'77';dctx.beginPath();dctx.arc(dc2.x,dc2.y,10,0,Math.PI*2);dctx.fill();dctx.strokeStyle=p.color;dctx.lineWidth=2;dctx.beginPath();dctx.arc(dc2.x,dc2.y,14,0,Math.PI*2);dctx.stroke();
}

// Turn
function nextT(){const alive=players.filter(p=>p.alive);if(alive.length<=1){showW(alive[0]);return;}let n=(curP+1)%players.length;while(!players[n].alive)n=(n+1)%players.length;curP=n;updHUD();showTA();}
function showTA(){const p=players[curP];if(!p)return;const el=document.getElementById('tann');el.textContent=`Giliran ${p.name}`;el.style.borderColor=p.color+'88';el.style.color=p.color;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1200);}
function showKP(v,k){const el=document.createElement('div');el.className='kpop';el.textContent=`${k.name} membunuh ${v.name}!`;el.style.color=k.color;el.style.left=Math.max(10,wc.width/2-110)+'px';el.style.top=(wc.height/2-60)+'px';document.body.appendChild(el);setTimeout(()=>el.remove(),1400);}

// HUD
function buildHUD(){const c=document.getElementById('hplayers');c.innerHTML='';players.forEach((p,i)=>{const d=document.createElement('div');d.className='hud-p'+(i===curP?' active':'')+(p.alive?'':' dead');d.id='hpd'+i;d.style.setProperty('--pc',p.color);d.innerHTML=`<div class="hud-dot"></div><span>${p.name.replace('Player ','P')}</span><span class="hud-k">${p.kills}</span>`;c.appendChild(d);});}
function updHUD(){players.forEach((p,i)=>{const el=document.getElementById('hpd'+i);if(!el)return;el.className='hud-p'+(i===curP?' active':'')+(p.alive?'':' dead');el.querySelector('.hud-k').textContent=p.kills;});const p=players[curP];document.getElementById('hturn').textContent=p?`Giliran ${p.name.replace('Player ','')}`:'';}

// Win
function showW(w){running=false;const ws=document.getElementById('win');document.getElementById('wball').style.background=w?w.color:'#7c5cfc';document.getElementById('wball').style.boxShadow=`0 0 40px ${w?w.color+'88':'#7c5cfc88'},inset -8px -8px 20px rgba(0,0,0,0.3),inset 4px 4px 12px rgba(255,255,255,0.4)`;document.getElementById('wtitle').textContent=w?`${w.name} Menang!`:'Selesai!';document.getElementById('wkills').innerHTML=players.map(p=>`<div class="wbadge"><div style="width:10px;height:10px;border-radius:50%;background:${p.color}"></div>${p.name}: ${p.kills} kill</div>`).join('');ws.classList.add('show');}

// Loop
function loop(){
  ctx.save();ctx.translate(-Math.round(cx),-Math.round(cy));
  drawBG();obs.forEach(o=>drawO(o));
  if(moving)phys();updP();drwP();
  players.forEach((p,i)=>{if(p.alive)drawPl(p,i===curP);});
  ctx.restore();updC();drwMM();updHUD();
  af=requestAnimationFrame(loop);
}

// Helpers
function li(hex,a){const n=parseInt(hex.slice(1),16);return`rgb(${Math.min(255,(n>>16)+a)},${Math.min(255,((n>>8)&255)+a)},${Math.min(255,(n&255)+a)})`;}
function da(hex,a){const n=parseInt(hex.slice(1),16);return`rgb(${Math.max(0,(n>>16)-a)},${Math.max(0,((n>>8)&255)-a)},${Math.max(0,(n&255)-a)})`;}
function backMenu(){running=false;if(af)cancelAnimationFrame(af);ctx.clearRect(0,0,wc.width,wc.height);dctx.clearRect(0,0,dc.width,dc.height);showSel();}
</script>
