<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tutup Botol - Game</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Outfit',sans-serif;}

canvas{display:block;touch-action:none;}

/* HUD */
#hud{
  position:fixed;top:0;left:0;right:0;z-index:10;
  display:flex;align-items:center;gap:8px;
  padding:6px 12px;
  background:rgba(0,0,0,0.5);backdrop-filter:blur(8px);
  border-bottom:1px solid rgba(255,255,255,0.08);
}
.hud-player{
  display:flex;align-items:center;gap:6px;
  padding:4px 10px;border-radius:20px;
  background:rgba(255,255,255,0.06);border:1.5px solid transparent;
  transition:all 0.2s;
  font-family:'Boogaloo',cursive;font-size:13px;color:rgba(255,255,255,0.6);
}
.hud-player.active{
  background:rgba(255,255,255,0.14);
  color:#fff;
  box-shadow:0 0 12px var(--pc);
}
.hud-dot{width:10px;height:10px;border-radius:50%;background:var(--pc);box-shadow:0 0 6px var(--pc);}
.hud-kills{
  background:rgba(255,255,255,0.08);border-radius:99px;
  padding:2px 7px;font-size:10px;color:var(--pc);font-weight:800;
}
#hud-turn{
  margin-left:auto;font-family:'Boogaloo',cursive;font-size:14px;
  color:rgba(255,255,255,0.7);
}
#hud-map{
  font-size:11px;color:rgba(255,255,255,0.4);font-weight:700;
  letter-spacing:0.5px;text-transform:uppercase;
}
#hud-back{
  background:rgba(255,255,255,0.08);border:none;border-radius:50%;
  width:30px;height:30px;color:#fff;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
#hud-back:active{background:rgba(255,255,255,0.2);}

/* Drag indicator */
#dragLine{position:fixed;inset:0;pointer-events:none;z-index:5;}

/* Power bar */
#powerBar{
  position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  width:180px;height:8px;background:rgba(255,255,255,0.12);
  border-radius:99px;overflow:hidden;z-index:10;
  opacity:0;transition:opacity 0.2s;
}
#powerFill{height:100%;width:0%;border-radius:99px;background:linear-gradient(90deg,#00d4aa,#f5c518,#e94560);transition:width 0.05s;}

/* Kill popup */
.kill-popup{
  position:fixed;z-index:20;
  font-family:'Boogaloo',cursive;font-size:20px;color:#fff;
  text-shadow:0 0 20px currentColor;
  pointer-events:none;
  animation:killPop 1.2s ease forwards;
}
@keyframes killPop{
  0%{opacity:0;transform:translateY(0) scale(0.5);}
  20%{opacity:1;transform:translateY(-10px) scale(1.2);}
  60%{opacity:1;transform:translateY(-30px) scale(1);}
  100%{opacity:0;transform:translateY(-60px) scale(0.8);}
}

/* Turn announcement */
#turnAnnounce{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Boogaloo',cursive;font-size:28px;color:#fff;
  background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);
  padding:12px 28px;border-radius:16px;
  border:2px solid rgba(255,255,255,0.15);
  z-index:30;pointer-events:none;
  opacity:0;transition:opacity 0.3s;
}
#turnAnnounce.show{opacity:1;}

/* Win screen */
#winScreen{
  position:fixed;inset:0;z-index:50;
  background:rgba(0,0,0,0.85);backdrop-filter:blur(10px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;opacity:0;pointer-events:none;transition:opacity 0.4s;
}
#winScreen.show{opacity:1;pointer-events:all;}
#winBall{width:100px;height:100px;border-radius:50%;margin-bottom:8px;
  box-shadow:0 0 40px rgba(255,255,255,0.3),inset -8px -8px 20px rgba(0,0,0,0.3),inset 4px 4px 12px rgba(255,255,255,0.4);
  animation:bobble 2s ease-in-out infinite;}
@keyframes bobble{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
#winTitle{font-family:'Boogaloo',cursive;font-size:36px;color:#fff;text-align:center;}
#winSub{font-size:14px;color:rgba(255,255,255,0.6);text-align:center;}
#winKills{
  display:flex;gap:10px;flex-wrap:wrap;justify-content:center;
}
.win-kill-badge{
  background:rgba(255,255,255,0.08);border-radius:10px;padding:8px 14px;
  font-family:'Boogaloo',cursive;font-size:15px;color:#fff;
  display:flex;align-items:center;gap:6px;
}
#btnPlayAgain{
  background:linear-gradient(135deg,#7c5cfc,#5a3fcf);
  border:none;border-radius:14px;padding:14px 36px;
  color:#fff;font-family:'Boogaloo',cursive;font-size:22px;
  cursor:pointer;box-shadow:0 6px 20px rgba(124,92,252,0.4);
  margin-top:8px;
}
#btnPlayAgain:active{transform:scale(0.96);}

/* Map selector */
#mapSelect{
  position:fixed;inset:0;z-index:40;
  background:rgba(0,0,0,0.9);backdrop-filter:blur(10px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
}
#mapSelect h2{font-family:'Boogaloo',cursive;font-size:26px;color:#fff;margin-bottom:4px;}
.map-grid{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;max-width:500px;}
.map-btn{
  width:90px;height:70px;border-radius:14px;
  border:2px solid rgba(255,255,255,0.15);
  cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:5px;
  transition:all 0.15s;position:relative;overflow:hidden;
  font-family:'Boogaloo',cursive;font-size:12px;color:#fff;
}
.map-btn:active{transform:scale(0.93);}
.map-btn.selected{border-color:#7c5cfc;box-shadow:0 0 14px rgba(124,92,252,0.5);}
.map-btn-name{font-size:11px;font-weight:700;}
#btnStartGame{
  background:linear-gradient(135deg,#e94560,#c0392b);
  border:none;border-radius:14px;padding:14px 40px;
  color:#fff;font-family:'Boogaloo',cursive;font-size:22px;
  cursor:pointer;box-shadow:0 6px 20px rgba(233,69,96,0.4);
  margin-top:4px;
}
#btnStartGame:active{transform:scale(0.96);}

/* Player count select */
.pcount-row{display:flex;gap:8px;}
.pcnt-btn{
  width:44px;height:44px;border-radius:10px;
  background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.15);
  color:#fff;font-family:'Boogaloo',cursive;font-size:18px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;
}
.pcnt-btn.selected{background:rgba(124,92,252,0.3);border-color:#7c5cfc;color:#c4b0ff;}
.pcnt-btn:active{transform:scale(0.9);}
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>
<canvas id="dragLine" style="position:fixed;inset:0;pointer-events:none;z-index:5;"></canvas>

<!-- HUD -->
<div id="hud" style="display:none">
  <button id="hud-back" onclick="backToMenu()">‹</button>
  <div id="hud-players"></div>
  <div id="hud-turn">Giliran: -</div>
  <div id="hud-map">-</div>
</div>

<div id="powerBar"><div id="powerFill"></div></div>

<div id="turnAnnounce"></div>

<!-- Win screen -->
<div id="winScreen">
  <div id="winBall"></div>
  <div id="winTitle">Menang!</div>
  <div id="winSub"></div>
  <div id="winKills"></div>
  <button id="btnPlayAgain" onclick="showMapSelect()">Main Lagi</button>
</div>

<!-- Map select -->
<div id="mapSelect">
  <h2>Pilih Map & Pemain</h2>
  <div class="pcount-row" id="pcountRow">
    <button class="pcnt-btn selected" data-n="2" onclick="selectPCount(this)">2</button>
    <button class="pcnt-btn" data-n="3" onclick="selectPCount(this)">3</button>
    <button class="pcnt-btn" data-n="4" onclick="selectPCount(this)">4</button>
    <button class="pcnt-btn" data-n="5" onclick="selectPCount(this)">5</button>
    <button class="pcnt-btn" data-n="6" onclick="selectPCount(this)">6</button>
  </div>
  <div class="map-grid" id="mapGrid"></div>
  <button id="btnStartGame" onclick="startGame()">Mulai!</button>
</div>

<script>
// ===== CANVAS SETUP =====
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const dragCanvas = document.getElementById('dragLine');
const dctx = dragCanvas.getContext('2d');

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  dragCanvas.width = window.innerWidth;
  dragCanvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', ()=>{ resize(); if(gameRunning) generateMap(); });

// ===== CONSTANTS =====
const HUD_H = 46;
const PLAYER_COLORS = ['#00d4aa','#e94560','#f5c518','#7c5cfc','#74b9ff','#fd9644'];
const PLAYER_NAMES = ['Player 1','Player 2','Player 3','Player 4','Player 5','Player 6'];
const FRICTION = 0.965;
const BOUNCE = 0.62;
const BALL_R = 18;
const MAX_POWER = 22;
const MIN_MOVE = 0.3;

// ===== MAPS =====
const MAPS = [
  {id:'forest', name:'Hutan', color:'#1a3d1a', desc:'🌲'},
  {id:'space',  name:'Luar Angkasa', color:'#050520', desc:'🌌'},
  {id:'water',  name:'Di Atas Air', color:'#0a2a4a', desc:'🌊'},
  {id:'ground', name:'Tanah Lapang', color:'#3d2b0a', desc:'🏜️'},
  {id:'random', name:'Acak', color:'#1a1a2e', desc:'🎲'},
];

// ===== STATE =====
let players = [];
let obstacles = [];
let currentPlayerIdx = 0;
let gameRunning = false;
let selectedMap = 'forest';
let numPlayers = 2;
let moving = false;
let isDragging = false;
let dragStart = null;
let dragCurrent = null;
let animFrame = null;
let currentMapId = 'forest';
let particles = [];
let trail = [];

// ===== MAP SELECT =====
function initMapGrid(){
  const grid = document.getElementById('mapGrid');
  grid.innerHTML = '';
  MAPS.forEach(m=>{
    const btn = document.createElement('div');
    btn.className = 'map-btn' + (m.id===selectedMap?' selected':'');
    btn.style.background = m.id==='space'?'radial-gradient(ellipse at 30% 30%,#1a1040,#050520)':
                           m.id==='forest'?'radial-gradient(ellipse at 50% 50%,#1a4a1a,#0a200a)':
                           m.id==='water'?'radial-gradient(ellipse at 30% 70%,#0a3a6a,#051525)':
                           m.id==='ground'?'radial-gradient(ellipse at 50% 80%,#5a3a10,#2a1a05)':
                           'linear-gradient(135deg,#1a1040,#0a2040)';
    btn.innerHTML = `<span style="font-size:22px">${m.desc}</span><div class="map-btn-name">${m.name}</div>`;
    btn.onclick = ()=>{
      selectedMap = m.id;
      document.querySelectorAll('.map-btn').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
    };
    grid.appendChild(btn);
  });
}
initMapGrid();

function selectPCount(btn){
  numPlayers = parseInt(btn.dataset.n);
  document.querySelectorAll('.pcnt-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
}

function showMapSelect(){
  document.getElementById('mapSelect').style.display='flex';
  document.getElementById('winScreen').classList.remove('show');
  document.getElementById('hud').style.display='none';
  gameRunning = false;
  if(animFrame) cancelAnimationFrame(animFrame);
}
showMapSelect();

// ===== GAME START =====
function startGame(){
  document.getElementById('mapSelect').style.display='none';
  document.getElementById('hud').style.display='flex';
  document.getElementById('winScreen').classList.remove('show');

  currentMapId = selectedMap==='random' ? MAPS[Math.floor(Math.random()*4)].id : selectedMap;
  initPlayers();
  generateMap();
  buildHUD();
  gameRunning = true;
  moving = false;
  currentPlayerIdx = 0;
  particles = []; trail = [];
  showTurnAnnounce();
  if(animFrame) cancelAnimationFrame(animFrame);
  gameLoop();
}

function initPlayers(){
  players = [];
  const W = canvas.width, H = canvas.height;
  // Spread players around the arena
  const positions = [
    [W*0.15, H*0.5],
    [W*0.85, H*0.5],
    [W*0.5,  H*0.2],
    [W*0.5,  H*0.8],
    [W*0.2,  H*0.25],
    [W*0.8,  H*0.75],
  ];
  for(let i=0;i<numPlayers;i++){
    players.push({
      x: positions[i][0],
      y: positions[i][1],
      vx: 0, vy: 0,
      color: PLAYER_COLORS[i],
      name: PLAYER_NAMES[i],
      alive: true,
      kills: 0,
      skin: skins && skins[i] ? skins[i] : null,
      idx: i,
    });
  }
}

// ===== MAP GENERATION =====
function generateMap(){
  obstacles = [];
  const W = canvas.width, H = canvas.height;
  const mapId = currentMapId;

  if(mapId === 'ground') return; // No obstacles

  const count = mapId==='space' ? 14 : mapId==='forest' ? 16 : 12;

  for(let attempt=0; attempt<count*6 && obstacles.length<count; attempt++){
    const x = W*0.08 + Math.random()*W*0.84;
    const y = HUD_H + (H-HUD_H)*0.06 + Math.random()*(H-HUD_H)*0.88;

    // Don't place on players
    const tooClose = players.some(p=>Math.hypot(p.x-x,p.y-y)<80);
    if(tooClose) continue;

    // Don't overlap other obstacles
    const type = pickObstacleType(mapId);
    const obs = createObstacle(x, y, type, mapId);
    const overlap = obstacles.some(o=>Math.hypot(o.x-x,o.y-y)<(obs.r+o.r+10));
    if(!overlap) obstacles.push(obs);
  }
}

function pickObstacleType(mapId){
  const types = {
    forest: ['tree','bush','rock','log'],
    space:  ['asteroid','planet','meteor','debris'],
    water:  ['coral','rock','island','drift'],
  };
  const list = types[mapId] || ['rock'];
  return list[Math.floor(Math.random()*list.length)];
}

function createObstacle(x, y, type, mapId){
  const r = 14 + Math.random()*22;
  return {x, y, r, type, mapId,
    rot: Math.random()*Math.PI*2,
    color: getObstacleColor(type, mapId),
    color2: getObstacleColor2(type, mapId),
    w: r*2*(0.7+Math.random()*0.8),  // for non-circular
    h: r*(0.6+Math.random()*0.8),
  };
}

function getObstacleColor(type, mapId){
  const colors = {
    tree:'#1a5c1a', bush:'#2d7a2d', rock:'#5a5050', log:'#6b3d1a',
    asteroid:'#4a4060', planet:'#2a1060', meteor:'#8a3020', debris:'#3a3560',
    coral:'#c0392b', island:'#4a7a1a', rock:'#5a7090', drift:'#6b4a1a',
  };
  return colors[type] || '#555';
}
function getObstacleColor2(type, mapId){
  const colors = {
    tree:'#2a8c2a', bush:'#3aaa3a', rock:'#7a6868', log:'#8b5a2a',
    asteroid:'#6a5a80', planet:'#4a2080', meteor:'#cc5040', debris:'#5a5080',
    coral:'#e74c3c', island:'#6aaa2a', rock:'#7a90b0', drift:'#8b6a2a',
  };
  return colors[type] || '#888';
}

// ===== DRAW OBSTACLES =====
function drawObstacle(o){
  ctx.save();
  ctx.translate(o.x, o.y);
  ctx.rotate(o.rot);

  switch(o.type){
    case 'tree': drawTree(o); break;
    case 'bush': drawBush(o); break;
    case 'log': drawLog(o); break;
    case 'asteroid': drawAsteroid(o); break;
    case 'planet': drawPlanet(o); break;
    case 'meteor': drawMeteor(o); break;
    case 'debris': drawDebris(o); break;
    case 'coral': drawCoral(o); break;
    case 'island': drawIsland(o); break;
    case 'drift': drawDrift(o); break;
    default: drawRock(o); break;
  }

  ctx.restore();
}

function drawTree(o){
  // Trunk
  ctx.fillStyle='#5c3a1a';
  ctx.beginPath();
  ctx.roundRect(-o.r*0.18, -o.r*0.1, o.r*0.36, o.r*0.7, 3);
  ctx.fill();
  // Canopy layers
  const g = ctx.createRadialGradient(0,-o.r*0.3,0,0,-o.r*0.1,o.r*0.85);
  g.addColorStop(0,o.color2); g.addColorStop(1,o.color);
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.ellipse(0,-o.r*0.5,o.r*0.8,o.r*0.7,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-o.r*0.3,-o.r*0.2,o.r*0.55,o.r*0.5,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(o.r*0.3,-o.r*0.25,o.r*0.5,o.r*0.45,0,0,Math.PI*2); ctx.fill();
  // Shadow
  ctx.globalAlpha=0.2; ctx.fillStyle='#000';
  ctx.beginPath(); ctx.ellipse(o.r*0.2,o.r*0.2,o.r*0.6,o.r*0.25,0,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;
}

function drawBush(o){
  const g = ctx.createRadialGradient(0,-o.r*0.2,0,0,0,o.r);
  g.addColorStop(0,o.color2); g.addColorStop(1,o.color);
  ctx.fillStyle=g;
  for(let i=0;i<5;i++){
    const a=i/5*Math.PI*2, rx=o.r*(0.6+Math.random()*0.3), ry=o.r*(0.5+Math.random()*0.3);
    ctx.beginPath(); ctx.ellipse(Math.cos(a)*o.r*0.3,Math.sin(a)*o.r*0.3,rx*0.55,ry*0.55,a,0,Math.PI*2); ctx.fill();
  }
  ctx.beginPath(); ctx.ellipse(0,0,o.r*0.65,o.r*0.55,0,0,Math.PI*2); ctx.fill();
}

function drawRock(o){
  const g = ctx.createRadialGradient(-o.r*0.2,-o.r*0.3,0,0,0,o.r);
  g.addColorStop(0,o.color2); g.addColorStop(1,o.color);
  ctx.fillStyle=g;
  ctx.beginPath();
  ctx.moveTo(0,-o.r*0.9);
  ctx.bezierCurveTo(o.r*0.8,-o.r*0.6, o.r*0.95,o.r*0.2, o.r*0.5,o.r*0.8);
  ctx.bezierCurveTo(0,o.r*0.95, -o.r*0.7,o.r*0.75, -o.r*0.9,o.r*0.1);
  ctx.bezierCurveTo(-o.r,-o.r*0.5, -o.r*0.5,-o.r, 0,-o.r*0.9);
  ctx.fill();
  // Highlight
  ctx.fillStyle='rgba(255,255,255,0.15)';
  ctx.beginPath(); ctx.ellipse(-o.r*0.25,-o.r*0.3,o.r*0.3,o.r*0.2,-0.5,0,Math.PI*2); ctx.fill();
}

function drawLog(o){
  ctx.fillStyle=o.color;
  ctx.beginPath(); ctx.roundRect(-o.w*0.5,-o.h*0.4,o.w,o.h,o.h*0.4); ctx.fill();
  // Rings
  ctx.strokeStyle=o.color2; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.ellipse(-o.w*0.42,0,o.h*0.35,o.h*0.4,0,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(o.w*0.42,0,o.h*0.35,o.h*0.4,0,0,Math.PI*2); ctx.stroke();
  // Wood lines
  for(let i=0;i<3;i++){
    ctx.beginPath(); ctx.moveTo(-o.w*0.3+i*o.w*0.2,-o.h*0.35); ctx.lineTo(-o.w*0.3+i*o.w*0.2,o.h*0.35); ctx.stroke();
  }
}

function drawAsteroid(o){
  ctx.fillStyle=o.color;
  ctx.beginPath();
  const pts=8;
  for(let i=0;i<pts;i++){
    const a=i/pts*Math.PI*2, r=o.r*(0.7+Math.random()*0.35);
    i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
  }
  ctx.closePath(); ctx.fill();
  // Craters
  ctx.fillStyle='rgba(0,0,0,0.3)';
  for(let i=0;i<3;i++){
    ctx.beginPath(); ctx.arc(-o.r*0.2+i*o.r*0.2,-o.r*0.1,o.r*0.12+i*o.r*0.05,0,Math.PI*2); ctx.fill();
  }
  ctx.fillStyle='rgba(255,255,255,0.08)';
  ctx.beginPath(); ctx.ellipse(-o.r*0.3,-o.r*0.4,o.r*0.25,o.r*0.15,-0.4,0,Math.PI*2); ctx.fill();
}

function drawPlanet(o){
  const g = ctx.createRadialGradient(-o.r*0.3,-o.r*0.4,0,0,0,o.r);
  g.addColorStop(0,'#8060ff'); g.addColorStop(0.5,o.color2); g.addColorStop(1,o.color);
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.arc(0,0,o.r,0,Math.PI*2); ctx.fill();
  // Ring
  ctx.strokeStyle='rgba(180,150,255,0.5)'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.ellipse(0,0,o.r*1.6,o.r*0.4,0.3,0,Math.PI*2); ctx.stroke();
  // Atmosphere
  ctx.strokeStyle='rgba(255,255,255,0.1)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(0,0,o.r+2,0,Math.PI*2); ctx.stroke();
}

function drawMeteor(o){
  // Fire trail
  const g = ctx.createLinearGradient(-o.r,-o.r,o.r*0.5,o.r*0.5);
  g.addColorStop(0,'rgba(255,100,0,0)'); g.addColorStop(0.5,'rgba(255,150,0,0.5)'); g.addColorStop(1,o.color2);
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.moveTo(-o.r*1.2,-o.r*1.2); ctx.lineTo(0,-o.r*0.3); ctx.lineTo(-o.r*0.3,0); ctx.closePath(); ctx.fill();
  // Core
  const gc = ctx.createRadialGradient(-o.r*0.1,-o.r*0.1,0,0,0,o.r*0.7);
  gc.addColorStop(0,'#ff8844'); gc.addColorStop(1,o.color);
  ctx.fillStyle=gc;
  ctx.beginPath(); ctx.arc(0,0,o.r*0.7,0,Math.PI*2); ctx.fill();
}

function drawDebris(o){
  ctx.fillStyle=o.color;
  for(let i=0;i<4;i++){
    ctx.save(); ctx.rotate(i*Math.PI*0.5);
    ctx.fillRect(-o.r*0.4,-o.r*0.1,o.r*(0.6+i*0.1),o.r*0.2);
    ctx.restore();
  }
}

function drawCoral(o){
  ctx.strokeStyle=o.color2; ctx.lineWidth=3; ctx.lineCap='round';
  const branches=5;
  for(let i=0;i<branches;i++){
    const a=-Math.PI/2+(i-branches/2)*0.4;
    ctx.beginPath(); ctx.moveTo(0,o.r*0.4);
    ctx.quadraticCurveTo(Math.cos(a)*o.r*0.3,0,Math.cos(a)*o.r*0.7,-o.r*0.6); ctx.stroke();
    // Sub branches
    ctx.beginPath(); ctx.moveTo(Math.cos(a)*o.r*0.4,-o.r*0.2);
    ctx.lineTo(Math.cos(a+0.5)*o.r*0.5,-o.r*0.5); ctx.stroke();
  }
  ctx.fillStyle=o.color; ctx.beginPath(); ctx.arc(0,o.r*0.4,o.r*0.2,0,Math.PI*2); ctx.fill();
}

function drawIsland(o){
  // Water shadow
  ctx.fillStyle='rgba(0,100,180,0.3)';
  ctx.beginPath(); ctx.ellipse(0,o.r*0.2,o.r*1.1,o.r*0.4,0,0,Math.PI*2); ctx.fill();
  // Ground
  const g = ctx.createRadialGradient(0,0,0,0,0,o.r);
  g.addColorStop(0,'#7aaa3a'); g.addColorStop(0.6,o.color2); g.addColorStop(1,'#c8a060');
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.ellipse(0,0,o.r,o.r*0.7,0,0,Math.PI*2); ctx.fill();
  // Mini tree
  ctx.fillStyle='#5c3a1a'; ctx.fillRect(-3,-o.r*0.5,6,o.r*0.5);
  ctx.fillStyle='#2a8c2a'; ctx.beginPath(); ctx.arc(0,-o.r*0.6,o.r*0.35,0,Math.PI*2); ctx.fill();
}

function drawDrift(o){
  ctx.fillStyle=o.color;
  ctx.beginPath(); ctx.roundRect(-o.w*0.5,-o.h*0.3,o.w,o.h*0.6,o.h*0.3); ctx.fill();
  // Grain lines
  ctx.strokeStyle=o.color2; ctx.lineWidth=1;
  for(let i=0;i<4;i++){
    ctx.beginPath(); ctx.moveTo(-o.w*0.4+i*o.w*0.25,-o.h*0.25); ctx.lineTo(-o.w*0.35+i*o.w*0.25,o.h*0.2); ctx.stroke();
  }
}

// ===== DRAW MAP BACKGROUND =====
function drawBackground(){
  const W = canvas.width, H = canvas.height;
  const mapId = currentMapId;

  if(mapId==='forest'){
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#0d2e0d'); g.addColorStop(1,'#1a4a0a');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    // Ground texture dots
    ctx.fillStyle='rgba(0,80,0,0.15)';
    for(let i=0;i<40;i++){
      ctx.beginPath(); ctx.arc((i*137.5)%W,(i*97.3+50)%H,2+Math.random()*4,0,Math.PI*2); ctx.fill();
    }
  } else if(mapId==='space'){
    ctx.fillStyle='#020210'; ctx.fillRect(0,0,W,H);
    // Stars
    ctx.fillStyle='#fff';
    for(let i=0;i<120;i++){
      const sx=(i*137.5+23)%W, sy=(i*97.3+11)%H, sr=Math.random()<0.1?1.5:0.7;
      ctx.globalAlpha=0.4+Math.random()*0.6;
      ctx.beginPath(); ctx.arc(sx,sy,sr,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;
    // Nebula
    const ng=ctx.createRadialGradient(W*0.7,H*0.3,0,W*0.7,H*0.3,W*0.35);
    ng.addColorStop(0,'rgba(60,0,120,0.2)'); ng.addColorStop(1,'transparent');
    ctx.fillStyle=ng; ctx.fillRect(0,0,W,H);
  } else if(mapId==='water'){
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#0a2040'); g.addColorStop(0.5,'#0a3060'); g.addColorStop(1,'#051030');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    // Water ripples
    ctx.strokeStyle='rgba(0,150,255,0.08)'; ctx.lineWidth=1.5;
    for(let i=0;i<8;i++){
      ctx.beginPath(); ctx.ellipse(W*0.5,H*0.5,W*0.1*(i+1),H*0.04*(i+1),0,0,Math.PI*2); ctx.stroke();
    }
  } else if(mapId==='ground'){
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#4a2e08'); g.addColorStop(0.5,'#3d2508'); g.addColorStop(1,'#2a1a05');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    // Ground lines
    ctx.strokeStyle='rgba(120,70,20,0.2)'; ctx.lineWidth=1;
    for(let i=0;i<12;i++){
      ctx.beginPath(); ctx.moveTo(0,H*(i/12)); ctx.lineTo(W,H*(i/12)); ctx.stroke();
    }
  } else {
    ctx.fillStyle='#0a0a1a'; ctx.fillRect(0,0,W,H);
  }
  // HUD background fill
  ctx.fillStyle='rgba(0,0,0,0)'; ctx.fillRect(0,0,W,HUD_H);
}

// ===== DRAW PLAYER =====
function drawPlayer(p, isActive){
  if(!p.alive) return;
  const x=p.x, y=p.y, r=BALL_R;

  // Trail
  if(isActive && trail.length>1){
    ctx.beginPath();
    ctx.moveTo(trail[0].x,trail[0].y);
    trail.forEach(pt=>ctx.lineTo(pt.x,pt.y));
    ctx.strokeStyle=p.color+'55'; ctx.lineWidth=r*1.2; ctx.lineCap='round'; ctx.lineJoin='round';
    ctx.stroke();
    ctx.strokeStyle=p.color+'22'; ctx.lineWidth=r*1.8;
    ctx.stroke();
  }

  // Active glow ring
  if(isActive && !moving){
    ctx.beginPath(); ctx.arc(x,y,r+6,0,Math.PI*2);
    ctx.strokeStyle=p.color+'88'; ctx.lineWidth=2;
    ctx.setLineDash([4,4]); ctx.stroke(); ctx.setLineDash([]);
    // Pulse
    const pulse = 0.5+0.5*Math.sin(Date.now()/300);
    ctx.beginPath(); ctx.arc(x,y,r+10+pulse*4,0,Math.PI*2);
    ctx.strokeStyle=p.color+(Math.floor(pulse*99)).toString(16).padStart(2,'0');
    ctx.lineWidth=1.5; ctx.stroke();
  }

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(x+3,y+r*0.9,r*0.7,r*0.25,0,0,Math.PI*2); ctx.fill();

  // Ball body
  const g = ctx.createRadialGradient(x-r*0.3,y-r*0.35,0,x,y,r);
  g.addColorStop(0, lightenColor(p.color, 60));
  g.addColorStop(0.5, p.color);
  g.addColorStop(1, darkenColor(p.color, 40));
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();

  // Specular highlight
  ctx.fillStyle='rgba(255,255,255,0.45)';
  ctx.beginPath(); ctx.ellipse(x-r*0.28,y-r*0.3,r*0.22,r*0.15,-0.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.15)';
  ctx.beginPath(); ctx.ellipse(x+r*0.15,y+r*0.2,r*0.12,r*0.08,0.3,0,Math.PI*2); ctx.fill();
}

// ===== PARTICLES =====
function spawnParticles(x, y, color, count=12){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2, sp=2+Math.random()*5;
    particles.push({
      x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
      r:3+Math.random()*4, color,
      life:1, decay:0.04+Math.random()*0.03
    });
  }
}

function spawnBounceParticles(x, y, color){
  for(let i=0;i<5;i++){
    const a=Math.random()*Math.PI*2, sp=1+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:2+Math.random()*2,color,life:0.8,decay:0.08});
  }
}

function updateParticles(){
  particles = particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy;
    p.vx*=0.93; p.vy*=0.93; p.vy+=0.1;
    p.life-=p.decay; p.r*=0.97;
  });
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
}

// ===== PHYSICS =====
function physicsStep(){
  const W=canvas.width, H=canvas.height;
  const ap = players[currentPlayerIdx];
  if(!ap||!ap.alive) return;

  const speed = Math.hypot(ap.vx,ap.vy);
  if(speed<MIN_MOVE && moving){
    ap.vx=0; ap.vy=0;
    moving=false;
    trail=[];
    // Check if killed anyone, if not next turn
    nextTurn();
    return;
  }

  ap.vx*=FRICTION; ap.vy*=FRICTION;
  ap.x+=ap.vx; ap.y+=ap.vy;

  // Trail
  trail.push({x:ap.x,y:ap.y});
  if(trail.length>25) trail.shift();

  // Wall bounce
  if(ap.x-BALL_R<0){ ap.x=BALL_R; ap.vx=Math.abs(ap.vx)*BOUNCE; spawnBounceParticles(ap.x,ap.y,ap.color); }
  if(ap.x+BALL_R>W){ ap.x=W-BALL_R; ap.vx=-Math.abs(ap.vx)*BOUNCE; spawnBounceParticles(ap.x,ap.y,ap.color); }
  if(ap.y-BALL_R<HUD_H){ ap.y=HUD_H+BALL_R; ap.vy=Math.abs(ap.vy)*BOUNCE; spawnBounceParticles(ap.x,ap.y,ap.color); }
  if(ap.y+BALL_R>H){ ap.y=H-BALL_R; ap.vy=-Math.abs(ap.vy)*BOUNCE; spawnBounceParticles(ap.x,ap.y,ap.color); }

  // Obstacle collision
  obstacles.forEach(o=>{
    const dx=ap.x-o.x, dy=ap.y-o.y, dist=Math.hypot(dx,dy);
    const minDist=BALL_R+o.r*0.85;
    if(dist<minDist&&dist>0){
      const nx=dx/dist, ny=dy/dist;
      ap.x=o.x+nx*minDist; ap.y=o.y+ny*minDist;
      const dot=ap.vx*nx+ap.vy*ny;
      ap.vx=(ap.vx-2*dot*nx)*BOUNCE;
      ap.vy=(ap.vy-2*dot*ny)*BOUNCE;
      spawnBounceParticles(ap.x,ap.y,ap.color);
    }
  });

  // Player collision (kill check)
  players.forEach(p=>{
    if(p===ap||!p.alive) return;
    const dx=ap.x-p.x, dy=ap.y-p.y, dist=Math.hypot(dx,dy);
    if(dist<BALL_R*1.9){
      // Kill!
      p.alive=false;
      ap.kills++;
      spawnParticles(p.x,p.y,p.color,20);
      showKillPopup(p.x,p.y,ap.color,`${ap.name} kills ${p.name}!`);
      updateHUD();

      // Check win
      const alive = players.filter(p2=>p2.alive);
      if(alive.length<=1){
        setTimeout(()=>showWin(ap),600);
        return;
      }
      // Extra turn on kill — stop then give another turn
      setTimeout(()=>{ ap.vx=0; ap.vy=0; moving=false; trail=[]; showTurnAnnounce(); },400);
    }
  });
}

// ===== TURN MANAGEMENT =====
function nextTurn(){
  const alive = players.filter(p=>p.alive);
  if(alive.length<=1){ showWin(alive[0]); return; }

  // Find next alive player
  let next = (currentPlayerIdx+1) % players.length;
  while(!players[next].alive) next=(next+1)%players.length;
  currentPlayerIdx=next;
  updateHUD();
  showTurnAnnounce();
}

function showTurnAnnounce(){
  const p = players[currentPlayerIdx];
  if(!p) return;
  const el=document.getElementById('turnAnnounce');
  el.textContent=`Giliran ${p.name}`;
  el.style.borderColor=p.color+'88';
  el.style.color=p.color;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),1200);
}

// ===== HUD =====
function buildHUD(){
  const container=document.getElementById('hud-players');
  container.innerHTML='';
  players.forEach((p,i)=>{
    const d=document.createElement('div');
    d.className='hud-player'+(i===currentPlayerIdx?' active':'');
    d.id='hp-'+i;
    d.style.setProperty('--pc',p.color);
    if(!p.alive) d.style.opacity='0.3';
    d.innerHTML=`<div class="hud-dot"></div><span>${p.name}</span><span class="hud-kills">${p.kills}</span>`;
    container.appendChild(d);
  });
  const mapName = MAPS.find(m=>m.id===currentMapId)?.name||'';
  document.getElementById('hud-map').textContent=mapName;
}

function updateHUD(){
  players.forEach((p,i)=>{
    const el=document.getElementById('hp-'+i);
    if(!el) return;
    el.className='hud-player'+(i===currentPlayerIdx?' active':'');
    el.style.opacity=p.alive?'1':'0.3';
    el.querySelector('.hud-kills').textContent=p.kills;
  });
}

// ===== KILL POPUP =====
function showKillPopup(x,y,color,text){
  const el=document.createElement('div');
  el.className='kill-popup';
  el.textContent=text;
  el.style.left=Math.min(window.innerWidth-200,Math.max(0,x-80))+'px';
  el.style.top=(y-40)+'px';
  el.style.color=color;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1300);
}

// ===== WIN =====
function showWin(winner){
  gameRunning=false;
  const ws=document.getElementById('winScreen');
  document.getElementById('winBall').style.background=winner?winner.color:'#7c5cfc';
  document.getElementById('winBall').style.boxShadow=`0 0 40px ${winner?winner.color+'88':'#7c5cfc88'},inset -8px -8px 20px rgba(0,0,0,0.3),inset 4px 4px 12px rgba(255,255,255,0.4)`;
  document.getElementById('winTitle').textContent=winner?`${winner.name} Menang!`:'Seri!';
  document.getElementById('winSub').textContent='Game selesai!';
  const kills=document.getElementById('winKills');
  kills.innerHTML=players.map(p=>`<div class="win-kill-badge" style="border-color:${p.color}44"><div style="width:12px;height:12px;border-radius:50%;background:${p.color}"></div>${p.name}: ${p.kills} kill</div>`).join('');
  ws.classList.add('show');
}

// ===== DRAG INPUT =====
function getPos(e){
  const t=e.touches?e.touches[0]:e;
  return {x:t.clientX, y:t.clientY};
}

canvas.addEventListener('pointerdown', e=>{
  if(!gameRunning||moving) return;
  const p=players[currentPlayerIdx];
  if(!p||!p.alive) return;
  const pos=getPos(e);
  const dx=pos.x-p.x, dy=pos.y-p.y;
  if(Math.hypot(dx,dy)<BALL_R*3){
    isDragging=true;
    dragStart=pos;
    dragCurrent=pos;
    canvas.setPointerCapture(e.pointerId);
    document.getElementById('powerBar').style.opacity='1';
  }
},{passive:false});

canvas.addEventListener('pointermove', e=>{
  if(!isDragging) return;
  e.preventDefault();
  dragCurrent=getPos(e);
  drawDragIndicator();
  // Update power bar
  const p=players[currentPlayerIdx];
  const dx=dragStart.x-dragCurrent.x, dy=dragStart.y-dragCurrent.y;
  const power=Math.min(Math.hypot(dx,dy)/80,1);
  document.getElementById('powerFill').style.width=(power*100)+'%';
},{passive:false});

canvas.addEventListener('pointerup', e=>{
  if(!isDragging) return;
  isDragging=false;
  document.getElementById('powerBar').style.opacity='0';
  dctx.clearRect(0,0,dragCanvas.width,dragCanvas.height);

  const p=players[currentPlayerIdx];
  if(!p||!p.alive) return;

  // Flick direction: opposite of drag (slingshot)
  const dx=dragStart.x-dragCurrent.x;
  const dy=dragStart.y-dragCurrent.y;
  const dist=Math.hypot(dx,dy);
  if(dist<8) return; // Too small

  const power=Math.min(dist/80,1);
  const speed=power*MAX_POWER;
  p.vx=(dx/dist)*speed;
  p.vy=(dy/dist)*speed;
  moving=true;
  trail=[];
  spawnParticles(p.x,p.y,p.color,8);
});

function drawDragIndicator(){
  dctx.clearRect(0,0,dragCanvas.width,dragCanvas.height);
  if(!dragStart||!dragCurrent) return;
  const p=players[currentPlayerIdx];
  if(!p) return;

  // Direction line from player
  const dx=dragStart.x-dragCurrent.x;
  const dy=dragStart.y-dragCurrent.y;
  const dist=Math.hypot(dx,dy);
  if(dist<4) return;

  const nx=dx/dist, ny=dy/dist;
  const power=Math.min(dist/80,1);
  const len=power*80;

  // Trajectory dots
  let sx=p.x, sy=p.y, svx=nx*power*MAX_POWER, svy=ny*power*MAX_POWER;
  dctx.fillStyle=p.color;
  for(let i=0;i<12;i++){
    svx*=FRICTION; svy*=FRICTION;
    sx+=svx; sy+=svy;
    dctx.globalAlpha=(1-i/12)*0.6;
    dctx.beginPath(); dctx.arc(sx,sy,BALL_R*(1-i/16),0,Math.PI*2); dctx.fill();
  }
  dctx.globalAlpha=1;

  // Arrow from player to direction
  dctx.strokeStyle=p.color+'cc'; dctx.lineWidth=2;
  dctx.setLineDash([5,4]);
  dctx.beginPath(); dctx.moveTo(p.x,p.y); dctx.lineTo(p.x+nx*len*0.5,p.y+ny*len*0.5);
  dctx.stroke(); dctx.setLineDash([]);

  // Drag point visual
  dctx.fillStyle=p.color+'88';
  dctx.beginPath(); dctx.arc(dragCurrent.x,dragCurrent.y,10,0,Math.PI*2); dctx.fill();
  dctx.strokeStyle=p.color; dctx.lineWidth=2;
  dctx.beginPath(); dctx.arc(dragCurrent.x,dragCurrent.y,14,0,Math.PI*2); dctx.stroke();
}

// ===== GAME LOOP =====
function gameLoop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawBackground();

  // Draw obstacles
  obstacles.forEach(o=>drawObstacle(o));

  if(moving) physicsStep();
  updateParticles();
  drawParticles();

  // Draw all players
  players.forEach((p,i)=>{
    if(p.alive) drawPlayer(p, i===currentPlayerIdx);
  });

  animFrame=requestAnimationFrame(gameLoop);
}

// ===== HELPERS =====
function lightenColor(hex, amt){
  const n=parseInt(hex.slice(1),16);
  const r=Math.min(255,(n>>16)+amt), g=Math.min(255,((n>>8)&0xff)+amt), b=Math.min(255,(n&0xff)+amt);
  return `rgb(${r},${g},${b})`;
}
function darkenColor(hex, amt){
  const n=parseInt(hex.slice(1),16);
  const r=Math.max(0,(n>>16)-amt), g=Math.max(0,((n>>8)&0xff)-amt), b=Math.max(0,(n&0xff)-amt);
  return `rgb(${r},${g},${b})`;
}

function backToMenu(){
  gameRunning=false;
  if(animFrame) cancelAnimationFrame(animFrame);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  dctx.clearRect(0,0,dragCanvas.width,dragCanvas.height);
  showMapSelect();
}

// Expose for skin integration
const skins = null;
